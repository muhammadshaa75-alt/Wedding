<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Save The Date - Traditional Union</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Marcellus&family=Great+Vibes&display=swap"
        rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="card" id="main-card">
        <div class="banner-container">
            <div class="save-the-date-banner">SAVE THE DATE</div>
        </div>
        <div class="instruction">Scratch the heart with your coin</div>

        <div class="scratch-container" id="emitter-source">
            <!-- Hidden Traditional Marriage Content Details -->
            <div class="secret-content">
                <div class="marriage-headline">The Marriage Of</div>
                <div class="couple-names">Sarah & David</div>
            </div>
            <!-- Traditional Canvas Plate Shield -->
            <canvas id="scratch-canvas" width="300" height="280"></canvas>
        </div>

        <div class="wedding-details">
            <span class="date-highlight">OCTOBER 14, 2026</span>
            AT 4:00 PM IN THE AFTERNOON<br>
            <small style="color: #666; font-size:10px; letter-spacing:1px; display:block; margin-top:5px;">THE
                BOTANICAL GARDENS, NY</small>
        </div>

        <div class="greeting-wrapper">
            <div class="greeting-line">TOGETHER WITH THEIR FAMILIES, WE CORDIALLY</div>
            <div class="greeting-line" style="color: #d4af37; font-weight: bold; margin-top: 2px;">INVITE YOU TO
                CELEBRATE THEIR UNION</div>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            const canvas = document.getElementById('scratch-canvas');
            const ctx = canvas.getContext('2d');
            let isDrawing = false;
            let revealed = false;

            // Render a classic textured silver metallic canvas overlay coat
            function drawTraditionalHeart() {
                ctx.fillStyle = '#8a8385';
                ctx.beginPath();
                ctx.moveTo(150, 260);
                ctx.bezierCurveTo(-40, 130, 10, 0, 150, 75);
                ctx.bezierCurveTo(290, 0, 340, 130, 150, 260);
                ctx.closePath();
                ctx.fill();

                // Inner border lining inside the scratch foil
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.25)';
                ctx.lineWidth = 2;
                ctx.setLineDash([6, 4]);
                ctx.beginPath();
                ctx.moveTo(150, 245);
                ctx.bezierCurveTo(-25, 125, 20, 15, 150, 85);
                ctx.bezierCurveTo(280, 15, 325, 125, 150, 245);
                ctx.closePath();
                ctx.stroke();

                ctx.setLineDash([]);

                // Typography Stamp
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 12px Marcellus';
                ctx.letterSpacing = '2px';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('SCRATCH HERE', 150, 145);
            }

            drawTraditionalHeart();

            ctx.globalCompositeOperation = 'destination-out';

            function getCoordinates(e) {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            }

            function startScratching(e) {
                isDrawing = true;
                scratch(e);
            }

            function scratch(e) {
                if (!isDrawing) return;
                e.preventDefault();

                const coords = getCoordinates(e);
                ctx.lineWidth = 42;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                ctx.lineTo(coords.x, coords.y);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(coords.x, coords.y);

                checkScratchPercentage();
            }

            function stopScratching() {
                isDrawing = false;
                ctx.beginPath();
            }

            $(canvas).on('mousedown', startScratching).on('mousemove', scratch);
            $(window).on('mouseup', stopScratching);
            $(canvas).on('touchstart', startScratching).on('touchmove', scratch);
            $(window).on('touchend', stopScratching);

            function checkScratchPercentage() {
                if (revealed) return;

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;
                let cleared = 0;

                for (let i = 3; i < pixels.length; i += 4) {
                    if (pixels[i] === 0) cleared++;
                }

                const percent = (cleared / (pixels.length / 4)) * 100;

                if (percent > 35) {
                    revealed = true;
                    $(canvas).css('opacity', 0);
                    setTimeout(() => $(canvas).remove(), 600);

                    // Apply blush shift state specifically onto the CARD container
                    $('#main-card').addClass('revealed');

                    // Fire traditional gold heart burst explosion particles inside
                    triggerInternalGoldBurst();
                }
            }

            function triggerInternalGoldBurst() {
                // Generate 45 decorative gold heart items scattering within card borders
                for (let i = 0; i < 45; i++) {
                    spawnInternalBurstElement();
                }
            }

            function spawnInternalBurstElement() {
                const shapes = ['&#x2764;', '&#9825;', '&#10084;'];
                const selectedShape = shapes[Math.floor(Math.random() * shapes.length)];

                // Track center positions relative to the card container
                const cardWidth = $('#main-card').width();
                const cardHeight = $('#main-card').height();

                // Center origin coordinates where scratch heart resides
                const startX = cardWidth / 2;
                const startY = cardHeight / 2 - 10;

                // Calculate horizontal explosion bounds and graceful gravitational drop paths
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 120 + 40;

                // X stays bounded within side walls; Y drifts downward toward the end
                const xDest = Math.cos(angle) * force + (Math.random() * 40 - 20) + 'px';
                const yDest = Math.sin(angle) * force + (Math.random() * 50 + 100) + 'px'; // Natural fall gravity

                const scaleDest = Math.random() * (1.3 - 0.5) + 0.5;
                const rotDest = (Math.random() * 360 - 180) + 'deg';
                const duration = (Math.random() * (3.5 - 2) + 2) + 's';

                const $heart = $('<div class="burst-heart"></div>')
                    .html(selectedShape)
                    .css({
                        'left': startX + 'px',
                        'top': startY + 'px',
                        '--x-dest': xDest,
                        '--y-dest': yDest,
                        '--scale-dest': scaleDest,
                        '--rot-dest': rotDest,
                        'animation-duration': duration
                    });

                // Crucial element appending onto CARD instead of general window Body
                $('#main-card').append($heart);

                setTimeout(() => $heart.remove(), parseFloat(duration) * 1000);
            }
        });
    </script>
</body>

</html>
